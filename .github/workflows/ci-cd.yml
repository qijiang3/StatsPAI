name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      publish_target:
        description: 'Which index to publish to'
        type: choice
        options:
          - none
          - testpypi-only
          - pypi-only
          - both
        default: none

# Opt into Node 24 runtime early for all JavaScript actions.
# GitHub's documented migration path (blog post 2025-09-19) before the
# hard cutover on 2026-06-02. Keeps existing action versions intact and
# just swaps the runtime, so no surface-area change in our steps.
# Security: pure runner config, no user input.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Drain the queue backlog: the full matrix is 13 shards × ~1.5h, so back-to-back
# pushes to main pile up faster than the runner pool can clear them. Group runs
# per (workflow, ref) and cancel any superseded in-progress/queued run on a new
# push — only the latest commit on a branch matters for CI feedback.
# Guard: never cancel a `release` run (tag ref, isolated group) so an in-flight
# publish to PyPI is never interrupted mid-upload.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  # Decide the test matrix based on trigger:
  #   - pull_request: 1 combo (ubuntu-latest × 3.10) — fast PR feedback, keeps Codecov upload
  #   - push / release / workflow_dispatch: full 13-combo matrix
  # Rationale: PR CI was ~44 min wall-clock on the slowest Windows shard; a PR
  # rarely needs all 13 shards to catch regressions, and push-to-main still runs
  # the full matrix before any release. Fully reversible: delete set-matrix and
  # inline the old matrix block to restore.
  set-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.compute.outputs.matrix }}
    env:
      EVENT_NAME: ${{ github.event_name }}
    steps:
      - id: compute
        shell: bash
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            # Match the Codecov upload combo (ubuntu-latest × 3.10) so PR runs still publish coverage.
            echo 'matrix={"include":[{"os":"ubuntu-latest","python-version":"3.10"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"os":"ubuntu-latest","python-version":"3.9"},{"os":"ubuntu-latest","python-version":"3.10"},{"os":"ubuntu-latest","python-version":"3.11"},{"os":"ubuntu-latest","python-version":"3.12"},{"os":"ubuntu-latest","python-version":"3.13"},{"os":"windows-latest","python-version":"3.10"},{"os":"windows-latest","python-version":"3.11"},{"os":"windows-latest","python-version":"3.12"},{"os":"windows-latest","python-version":"3.13"},{"os":"macos-latest","python-version":"3.10"},{"os":"macos-latest","python-version":"3.11"},{"os":"macos-latest","python-version":"3.12"},{"os":"macos-latest","python-version":"3.13"}]}' >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: set-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.set-matrix.outputs.matrix) }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Install parity extra (canonical env — runs the doubleml external-parity pins)
      # doubleml is the opt-in `parity` extra (not in `dev`). Installing it on
      # the canonical ubuntu+3.10 env makes tests/external_parity/
      # test_dml_python_parity.py actually run its 2 sp.dml-vs-doubleml pins,
      # so the JSS external-parity headline count (52) is verified rather than
      # silently skipped. Other matrix entries skip those 2 pins and the
      # count-drift guard degrades gracefully (see test_jss_validation_api.py).
      # Mirrors the flake8 / mypy / coverage canonical-env gating below.
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      run: pip install -e ".[parity]"

    - name: Lint with flake8 (hard syntax errors — all matrix entries)
      # E9/F63/F7/F82 are real syntax / undefined-name breakage and must be
      # zero on every OS × Python combo.
      run: |
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: flake8 baseline gate (single canonical env)
      # The full violation COUNT drifts by Python version (3.12's PEP-701
      # f-string tokenisation makes pyflakes report more on 3.12/3.13), so the
      # ``scripts/quality_gate.py`` count ratchet is pinned to one canonical
      # interpreter — same pattern as the mypy gate below — to stay stable.
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      run: |
        python scripts/quality_gate.py flake8

    - name: Type baseline with mypy
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      run: |
        python scripts/quality_gate.py mypy

    # Coverage instrumentation crashes on numpy 2.0.2 (the last numpy that
    # supports Python 3.9): under coverage's tracer numpy is imported twice,
    # which breaks the ``np._NoValue`` sentinel identity and makes reductions
    # raise ``int()/float() ... not '_NoValueType'``. Fixed upstream in
    # numpy >= 2.1 (requires Python >= 3.10). So measure coverage on a single
    # modern interpreter — ubuntu + 3.10, present in both the reduced and full
    # matrices and the same pin used by the flake8/mypy gates — where numpy is
    # >= 2.1 and the bug is absent. Every other matrix entry runs the full
    # suite without ``--cov``. Root cause: docs/rfc (E1 analysis).
    # Coverage baseline: the 2026-05-28 local full-suite run (committed
    # ``coverage.xml``, v1.16.0) measured 70.5% line coverage repo-wide
    # (61,681 / 87,476 lines). The gate is therefore set to 60 — a 4x lift
    # over the historical 15 placeholder, held ~10pp below the measured
    # baseline so ordinary fold-split / platform variance cannot red a PR.
    # Ratchet upward (60 -> 65 -> 70) once each step is confirmed green in
    # CI on the canonical ubuntu+3.10 env; never set the gate above the last
    # CI-verified number.
    - name: Test with pytest (coverage)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      run: |
        pytest tests/ -v --cov=statspai --cov-report=xml --cov-report=term-missing --cov-fail-under=60

    # Per-module ratchet for the six core estimators (did iv rd synth dml panel).
    # The repo-wide --cov-fail-under above is a soft floor; this gate locks each
    # core module at the hard ≥95% the coverage campaign achieved so none can
    # silently regress. Reuses the coverage.xml just produced. Ratchet the --min
    # upward only after a higher number is confirmed green here.
    - name: Core-module coverage ratchet (did/iv/rd/synth/dml/panel ≥ 95%)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      run: |
        python scripts/coverage_campaign.py report --xml coverage.xml --check --min 95

    - name: Test with pytest (no coverage)
      if: ${{ !(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10') }}
      run: |
        pytest tests/ -v

    - name: Build and smoke installed wheel (bare install — lazy-import guard)
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      shell: bash
      # Installs ONLY the wheel + its core runtime deps — no extras
      # (no torch / jax / pymc / pyfixest / matplotlib). The estimator
      # smoke below therefore proves two things at once: (1) the published
      # artifact is importable and self-contained, and (2) core econometric
      # paths (IV, staggered DiD) run without any optional extra, i.e. the
      # heavy deps are genuinely lazily imported. If a core estimator ever
      # starts eager-importing torch/jax/pymc, this step fails here rather
      # than in a downstream user's bare `pip install statspai`.
      run: |
        python -m build --sdist --wheel
        python -m venv .wheel-smoke
        .wheel-smoke/bin/python -m pip install --upgrade pip
        .wheel-smoke/bin/python -m pip install dist/*.whl
        .wheel-smoke/bin/python - <<'PY'
        import numpy as np
        import statspai as sp
        from statspai.cli import main

        # Identity + citation metadata + CLI entrypoint.
        assert sp.__version__
        assert "StatsPAI" in sp.citation("cff")
        assert main(["version"]) == 0

        # Core estimators on bundled data — must run on the bare install.
        card = sp.datasets.card_1995()
        iv = sp.ivreg(
            "lwage ~ (educ ~ nearc4) + exper + expersq + black + south + smsa",
            data=card,
        )
        assert np.isfinite(float(iv.params["educ"])), "IV educ coef not finite"

        mpdta = sp.datasets.mpdta()
        did = sp.callaway_santanna(
            data=mpdta, y="lemp", t="year", i="countyreal", g="first_treat"
        )
        att = sp.aggte(did, type="simple")
        assert np.isfinite(float(att.estimate)), "DiD simple ATT not finite"

        print("bare-install smoke OK:",
              f"IV educ={float(iv.params['educ']):.4f}, "
              f"DiD ATT={float(att.estimate):.4f}")
        PY

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/

  publish-test:
    needs: test
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && (inputs.publish_target == 'testpypi-only' || inputs.publish_target == 'both'))
    environment: testpypi
    permissions:
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Publish to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        skip-existing: true

  publish-prod:
    needs: test
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'release' && github.event.action == 'published') ||
      (github.event_name == 'workflow_dispatch' && (inputs.publish_target == 'pypi-only' || inputs.publish_target == 'both'))
    environment: pypi
    permissions:
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine

    - name: Build package
      run: python -m build

    - name: Check package
      run: twine check dist/*

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        skip-existing: true

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit

    - name: Run safety check
      run: safety check --json || true

    - name: Run bandit security check
      run: bandit -r src/ -f json --severity-level medium
